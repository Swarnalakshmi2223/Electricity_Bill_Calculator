<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Bill Calculator</title>
    
    <!--link for external CSS-->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div>
        

        <form id="billForm">
            
            <h1>Electricity Bill Calculator</h1>
            <label for="name"><strong>Customer Name:</strong></label>
            <input type="text" id="name" placeholder="Enter the customer name"><br><br>

            <label for="unit"><strong>Units Consumed:</strong></label>
            <input type="number" id="unit" placeholder="Enter the units consumed"><br><br>

            <button type="button" id="calculate"><strong>Calculate Bill</strong></button>

            <button type="reset" id="reset"><strong>Clear</strong></button>
             
            <div>
                <div id="display" ></div>
            </div>

        </form>
    </div>
    

    <!--link for external JS-->
    <script src="script.js"></script>
</body>
</html>
